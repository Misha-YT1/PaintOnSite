<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Малювання</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="drawing-wrapper">
        <div class="tool-panel">
            <h2>Кольори</h2>
            <button class="color-btn active" data-color="#000000" style="background: #000000;"></button>
            <button class="color-btn" data-color="#ff0000" style="background: #ff0000;"></button>
            <button class="color-btn" data-color="#0000ff" style="background: #0000ff;"></button>
            <button class="color-btn" data-color="#ff8c00" style="background: #ff8c00;"></button>
            <button class="color-btn" data-color="#ffff00" style="background: #ffff00;"></button>
            <button class="color-btn" data-color="#008000" style="background: #008000;"></button>
            <button class="color-btn" data-color="#800080" style="background: #800080;"></button>
            <button id="paletteBtn" class="palette-btn" type="button">Палітра</button>
            <input id="colorPicker" type="color" value="#000000" hidden>
            <button id="fillBtn" class="tool-btn" title="Заливка">🪣</button>
            <div class="brush-size-panel">
                <label for="brushSizeSlider">Розмір пензля: <span id="brushSizeDisplay">3</span>px</label>
                <input id="brushSizeSlider" type="range" min="3" max="50" value="3">
                <div class="history-buttons">
                    <button id="undoBtn" class="history-btn" type="button" disabled title="Відміна">←</button>
                    <button id="redoBtn" class="history-btn" type="button" disabled title="Повернути">→</button>
                </div>
                <button id="layoutBtn" class="tool-btn" type="button">Розмітка: немає</button>
                <div id="layoutOptions" class="layout-options" style="display: none;">
                    <button class="layout-option" data-layout="none" type="button">1. Немає</button>
                    <button class="layout-option" data-layout="grid" type="button">2. Сітка</button>
                    <button class="layout-option" data-layout="lines" type="button">3. Лінії</button>
                </div>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="drawingCanvas" width="900" height="650"></canvas>
            <div id="layoutOverlay" class="layout-overlay"></div>
            <div id="cursorCircle"></div>
            <div id="selectionBox" class="selection-box" style="display: none;">
                <canvas id="selectionOverlay"></canvas>
            </div>
        </div>
        <div class="shapes-panel">
            <h2>Фігури</h2>
            <button class="shape-btn" data-shape="square" title="Квадрат">⬜</button>
            <button class="shape-btn" data-shape="circle" title="Круг">⭕</button>
            <button class="shape-btn" data-shape="triangle" title="Трикутник">△</button>
            <button class="shape-btn" data-shape="diamond" title="Ромб">♦</button>
            <button class="shape-btn" data-shape="line" title="Лінія">━</button>
            <button class="shape-btn" data-shape="none" title="Малювання">✏️</button>
            <button id="selectBtn" class="shape-btn" data-action="select" title="Виділити">▭</button>
        </div>
    </div>
    <div class="controls-row">
        <button id="saveBtn">Зберегти</button>
        <button id="downloadBtn">Скачати у PNG</button>
        <button id="clearBtn">Очистити</button>
    </div>
    <div id="selectionControls" class="selection-controls" style="display: none;">
        <button id="rotateLeftBtn" type="button" title="Повернути ліворуч">↺</button>
        <button id="rotateRightBtn" type="button" title="Повернути праворуч">↻</button>
        <button id="scaleDownBtn" type="button" title="Зменшити">–</button>
        <span id="scaleDisplay">100%</span>
        <button id="scaleUpBtn" type="button" title="Збільшити">+</button>
        <button id="applySelectionBtn" type="button">Застосувати</button>
        <button id="cancelSelectionBtn" type="button">Скасувати</button>
    </div>
    
    <!-- Модальне вікно вибору типу трикутника -->
    <div id="triangleModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Оберіть тип трикутника</h3>
            <div class="triangle-options">
                <button class="triangle-option" data-triangle="right-triangle">
                    <div class="triangle right-triangle"></div>
                    <span>Прямокутний</span>
                </button>
                <button class="triangle-option" data-triangle="isosceles">
                    <div class="triangle isosceles"></div>
                    <span>Рівнобедрений</span>
                </button>
                <button class="triangle-option" data-triangle="acute">
                    <div class="triangle acute"></div>
                    <span>Гострокутний</span>
                </button>
                <button class="triangle-option" data-triangle="obtuse">
                    <div class="triangle obtuse"></div>
                    <span>Тупокутний</span>
                </button>
                <button class="triangle-option" data-triangle="equilateral">
                    <div class="triangle equilateral"></div>
                    <span>Рівносторонній</span>
                </button>
            </div>
            <button id="closeModal" class="close-btn">Скасувати</button>
        </div>
    </div>    <script>
        const canvas = document.getElementById('drawingCanvas');
        const ctx = canvas.getContext('2d');
        const saveBtn = document.getElementById('saveBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const cursorCircle = document.getElementById('cursorCircle');
        const brushSizeDisplay = document.getElementById('brushSizeDisplay');
        const brushSizeSlider = document.getElementById('brushSizeSlider');
        const fillBtn = document.getElementById('fillBtn');
        const selectBtn = document.getElementById('selectBtn');
        const layoutBtn = document.getElementById('layoutBtn');
        const layoutOptions = document.getElementById('layoutOptions');
        const layoutOverlay = document.getElementById('layoutOverlay');
        const selectionBox = document.getElementById('selectionBox');
        const selectionOverlay = document.getElementById('selectionOverlay');
        const selectionControls = document.getElementById('selectionControls');
        const rotateLeftBtn = document.getElementById('rotateLeftBtn');
        const rotateRightBtn = document.getElementById('rotateRightBtn');
        const scaleUpBtn = document.getElementById('scaleUpBtn');
        const scaleDownBtn = document.getElementById('scaleDownBtn');
        const applySelectionBtn = document.getElementById('applySelectionBtn');
        const cancelSelectionBtn = document.getElementById('cancelSelectionBtn');
        const scaleDisplay = document.getElementById('scaleDisplay');
        let layoutMode = 'none';

        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let drawingMode = null;
        let currentShape = 'none';
        let currentTriangleType = null;
        let shapeStartX = 0;
        let shapeStartY = 0;
        const eraserRadius = 15;
        let brushSize = 3;
        let canvasBackup = null;
        let isFillMode = false;
        const canvasContainer = document.querySelector('.canvas-container');
        let selectionMode = false;
        let isSelecting = false;
        let selectionStartX = 0;
        let selectionStartY = 0;
        let selectionImage = null;
        const selectionSourceCanvas = document.createElement('canvas');
        const selectionSourceCtx = selectionSourceCanvas.getContext('2d');
        let selectionX = 0;
        let selectionY = 0;
        let selectionW = 0;
        let selectionH = 0;
        let selectionAngle = 0;
        let selectionScale = 1;
        let isDraggingSelection = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let originalCanvasState = null;
        const undoStack = [];
        const redoStack = [];
        const maxHistory = 50;

        ctx.strokeStyle = '#000';
        ctx.lineWidth = brushSize;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        // Завантаження збереженого малюнка при завантаженні сторінки
        window.addEventListener('load', () => {
            const savedDrawing = localStorage.getItem('drawing');
            if (savedDrawing) {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, 0, 0);
                    pushUndoState();
                };
                img.src = savedDrawing;
            }
            updateHistoryButtons();
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 2) {
                e.preventDefault();
            }

            if (isFillMode) {
                pushUndoState();
                floodFill(e.offsetX, e.offsetY, currentColor);
                return;
            }

            if (selectionMode && !selectionImage) {
                e.preventDefault();
                isSelecting = true;
                selectionStartX = e.offsetX;
                selectionStartY = e.offsetY;
                selectionBox.style.left = `${selectionStartX}px`;
                selectionBox.style.top = `${selectionStartY}px`;
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                selectionBox.style.pointerEvents = 'none';
                selectionBox.style.display = 'block';
                return;
            }

            if (selectionMode && selectionImage) {
                return;
            }

            pushUndoState();
            isDrawing = true;
            shapeStartX = e.offsetX;
            shapeStartY = e.offsetY;
            lastX = e.offsetX;
            lastY = e.offsetY;

            if (e.button === 2) {
                drawingMode = 'erase';
                eraseAt(e.offsetX, e.offsetY);
            } else if (currentShape !== 'none') {
                drawingMode = 'shape';
                canvasBackup = ctx.getImageData(0, 0, canvas.width, canvas.height);
            } else {
                drawingMode = 'draw';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            updateCursor(e);

            if (isSelecting) {
                const x = Math.min(selectionStartX, e.offsetX);
                const y = Math.min(selectionStartY, e.offsetY);
                const width = Math.abs(e.offsetX - selectionStartX);
                const height = Math.abs(e.offsetY - selectionStartY);
                selectionBox.style.left = `${x}px`;
                selectionBox.style.top = `${y}px`;
                selectionBox.style.width = `${width}px`;
                selectionBox.style.height = `${height}px`;
                return;
            }

            if (!isDrawing) return;

            if (drawingMode === 'draw') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(e.offsetX, e.offsetY);
                ctx.stroke();
                [lastX, lastY] = [e.offsetX, e.offsetY];
            } else if (drawingMode === 'erase') {
                eraseAt(e.offsetX, e.offsetY);
            } else if (drawingMode === 'shape') {
                if (canvasBackup) {
                    ctx.putImageData(canvasBackup, 0, 0);
                }
                drawShape(currentShape, shapeStartX, shapeStartY, e.offsetX, e.offsetY);
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (isSelecting) {
                finalizeSelection(e);
                return;
            }
            isDrawing = false;
            drawingMode = null;
            canvasBackup = null;
        });

        canvas.addEventListener('mouseleave', () => {
            if (isSelecting) {
                finalizeSelection({ offsetX: selectionStartX, offsetY: selectionStartY, clientX: 0, clientY: 0 });
            }
            isDrawing = false;
            drawingMode = null;
            cursorCircle.style.display = 'none';
        });

        canvas.addEventListener('mouseenter', () => {
            cursorCircle.style.display = 'block';
            if (isFillMode || selectionMode) {
                canvas.style.cursor = 'crosshair';
            } else {
                canvas.style.cursor = 'default';
            }
        });

        function eraseAt(x, y) {
            ctx.clearRect(x - eraserRadius, y - eraserRadius, eraserRadius * 2, eraserRadius * 2);
        }

        function getCanvasCoords(event) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.min(Math.max(0, Math.round(event.clientX - rect.left)), canvas.width),
                y: Math.min(Math.max(0, Math.round(event.clientY - rect.top)), canvas.height)
            };
        }

        function clampSelectionPosition() {
            const bounds = getTransformedSize();
            const containerRect = canvasContainer.getBoundingClientRect();
            selectionX = Math.min(Math.max(0, selectionX), Math.max(0, containerRect.width - bounds.width));
            selectionY = Math.min(Math.max(0, selectionY), Math.max(0, containerRect.height - bounds.height));
            selectionBox.style.left = `${selectionX}px`;
            selectionBox.style.top = `${selectionY}px`;
        }

        function finalizeSelection(event) {
            isSelecting = false;
            const coords = event.offsetX !== undefined ? { x: event.offsetX, y: event.offsetY } : getCanvasCoords(event);
            const x = Math.min(selectionStartX, coords.x);
            const y = Math.min(selectionStartY, coords.y);
            const width = Math.abs(coords.x - selectionStartX);
            const height = Math.abs(coords.y - selectionStartY);
            if (width > 5 && height > 5) {
                selectionX = x;
                selectionY = y;
                selectionW = width;
                selectionH = height;
                originalCanvasState = ctx.getImageData(0, 0, canvas.width, canvas.height);
                selectionSourceCanvas.width = selectionW;
                selectionSourceCanvas.height = selectionH;
                selectionSourceCtx.clearRect(0, 0, selectionW, selectionH);
                selectionSourceCtx.drawImage(canvas, x, y, width, height, 0, 0, width, height);
                ctx.clearRect(x, y, width, height);
                selectionImage = selectionSourceCtx.getImageData(0, 0, width, height);
                selectionAngle = 0;
                selectionScale = 1;
                selectionControls.style.display = 'flex';
                selectionBox.style.display = 'block';
                selectionBox.style.cursor = 'move';
                selectionBox.style.pointerEvents = 'auto';
                redrawSelection();
            } else {
                selectionBox.style.display = 'none';
            }
        }

        function getTransformedSize() {
            const rotated = ((selectionAngle % 360) + 360) % 360;
            const scaledW = selectionW * selectionScale;
            const scaledH = selectionH * selectionScale;
            if (rotated === 90 || rotated === 270) {
                return { width: scaledH, height: scaledW };
            }
            return { width: scaledW, height: scaledH };
        }

        function redrawSelection() {
            if (!selectionImage) return;
            const transformed = getTransformedSize();
            const overlayCtx = selectionOverlay.getContext('2d');
            selectionOverlay.width = Math.max(1, Math.round(transformed.width));
            selectionOverlay.height = Math.max(1, Math.round(transformed.height));
            overlayCtx.setTransform(1, 0, 0, 1, 0, 0);
            overlayCtx.clearRect(0, 0, selectionOverlay.width, selectionOverlay.height);
            overlayCtx.save();
            overlayCtx.translate(selectionOverlay.width / 2, selectionOverlay.height / 2);
            overlayCtx.rotate(selectionAngle * Math.PI / 180);
            overlayCtx.drawImage(selectionSourceCanvas, -selectionW / 2, -selectionH / 2, selectionW, selectionH);
            overlayCtx.restore();
            selectionBox.style.width = `${selectionOverlay.width}px`;
            selectionBox.style.height = `${selectionOverlay.height}px`;
            clampSelectionPosition();
            scaleDisplay.textContent = `${Math.round(selectionScale * 100)}%`;
            selectionBox.style.display = 'block';
            selectionControls.style.display = 'flex';
        }

        function clearSelectionState() {
            selectionMode = false;
            isSelecting = false;
            selectionImage = null;
            selectionSourceCanvas.width = 0;
            selectionSourceCanvas.height = 0;
            selectionX = 0;
            selectionY = 0;
            selectionW = 0;
            selectionH = 0;
            selectionAngle = 0;
            selectionScale = 1;
            selectionBox.style.display = 'none';
            selectionBox.style.pointerEvents = 'auto';
            selectionControls.style.display = 'none';
            selectBtn.classList.remove('active');
            if (!isFillMode) {
                canvas.style.cursor = 'default';
            }
        }

        function cancelSelection() {
            if (!selectionImage) return;
            ctx.putImageData(originalCanvasState, 0, 0);
            clearSelectionState();
        }

        function applySelection() {
            if (!selectionImage) return;
            pushUndoState();
            const transformed = getTransformedSize();
            ctx.save();
            ctx.translate(selectionX + transformed.width / 2, selectionY + transformed.height / 2);
            ctx.rotate(selectionAngle * Math.PI / 180);
            ctx.drawImage(selectionSourceCanvas, -selectionW / 2, -selectionH / 2, selectionW * selectionScale, selectionH * selectionScale);
            ctx.restore();
            clearSelectionState();
        }

        function startSelectionMode() {
            selectionMode = true;
            selectionBox.style.display = 'none';
            selectionControls.style.display = 'none';
            selectBtn.classList.add('active');
            currentShape = 'none';
            shapeButtons.forEach(btn => btn.classList.remove('active'));
            isFillMode = false;
            fillBtn.classList.remove('active');
            canvas.style.cursor = 'crosshair';
        }

        function updateCursor(e) {
            if (isFillMode || selectionMode) {
                cursorCircle.style.display = 'none';
                return;
            }
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            cursorCircle.style.left = `${x}px`;
            cursorCircle.style.top = `${y}px`;
            const radius = drawingMode === 'erase' ? eraserRadius : brushSize / 2;
            cursorCircle.style.width = `${radius * 2}px`;
            cursorCircle.style.height = `${radius * 2}px`;
            cursorCircle.textContent = '';
        }

        function updateBrushSize(size) {
            brushSize = Number(size);
            ctx.lineWidth = brushSize;
            brushSizeDisplay.textContent = brushSize;
            brushSizeSlider.value = brushSize;
        }

        function updateHistoryButtons() {
            undoBtn.disabled = undoStack.length === 0;
            redoBtn.disabled = redoStack.length === 0;
        }

        function pushUndoState() {
            if (undoStack.length >= maxHistory) {
                undoStack.shift();
            }
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            redoStack.length = 0;
            updateHistoryButtons();
        }

        function restoreState(sourceStack, destinationStack) {
            if (sourceStack.length === 0) return;
            destinationStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            const state = sourceStack.pop();
            ctx.putImageData(state, 0, 0);
            updateHistoryButtons();
        }

        function undo() {
            restoreState(undoStack, redoStack);
        }

        function redo() {
            restoreState(redoStack, undoStack);
        }

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);

        function floodFill(x, y, fillColor) {
            // Округлення координат до цілих чисел
            x = Math.floor(x);
            y = Math.floor(y);
            
            // Перевірка, чи координати в межах канваса
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) {
                return;
            }
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Отримуємо колір пікселя, з якого починаємо заливку
            const startPos = (y * canvas.width + x) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];
            const startA = data[startPos + 3];
            
            // Parse the fill color
            const fillR = parseInt(fillColor.slice(1, 3), 16);
            const fillG = parseInt(fillColor.slice(3, 5), 16);
            const fillB = parseInt(fillColor.slice(5, 7), 16);
            
            // Якщо початковий колір вже такий же, як колір заливки, або якщо він прозорий, то нічого не робимо
            if (startR === fillR && startG === fillG && startB === fillB && startA === 255) {
                return;
            }
            
            const stack = [[x, y]];
            const visited = new Set();
            
            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                
                // Перевірка границь
                if (cx < 0 || cx >= canvas.width || cy < 0 || cy >= canvas.height) {
                    continue;
                }
                
                const pos = (cy * canvas.width + cx) * 4;
                
                // Перевірка, чи вже відвідано
                const key = cx + ',' + cy;
                if (visited.has(key)) {
                    continue;
                }
                visited.add(key);
                
                // Перевірка, чи цей піксель відповідає початковому кольору (з деяким допуском для антиаліасингу)
                const pixelR = data[pos];
                const pixelG = data[pos + 1];
                const pixelB = data[pos + 2];
                const pixelA = data[pos + 3];
                
                const colorMatch = Math.abs(pixelR - startR) < 10 && 
                                 Math.abs(pixelG - startG) < 10 && 
                                 Math.abs(pixelB - startB) < 10 &&
                                 Math.abs(pixelA - startA) < 10;
                
                if (colorMatch) {
                    // Заповнення пікселя новим кольором
                    data[pos] = fillR;
                    data[pos + 1] = fillG;
                    data[pos + 2] = fillB;
                    data[pos + 3] = 255; // Full opacity
                    
                    // Додавання сусідніх пікселів до стеку
                    stack.push([cx + 1, cy]);
                    stack.push([cx - 1, cy]);
                    stack.push([cx, cy + 1]);
                    stack.push([cx, cy - 1]);
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }

        const colorButtons = document.querySelectorAll('.color-btn');
        const paletteBtn = document.getElementById('paletteBtn');
        const colorPicker = document.getElementById('colorPicker');
        let currentColor = '#000000';

        function setColor(color) {
            currentColor = color;
            ctx.strokeStyle = color;
            colorPicker.value = color;
        }

        function setActiveColorButton(selectedButton) {
            colorButtons.forEach((button) => button.classList.remove('active'));
            selectedButton?.classList.add('active');
        }

        colorButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const color = button.dataset.color;
                setColor(color);
                setActiveColorButton(button);
            });
        });

        paletteBtn.addEventListener('click', () => {
            colorPicker.click();
        });

        colorPicker.addEventListener('input', (e) => {
            setColor(e.target.value);
            setActiveColorButton(null);
        });

        fillBtn.addEventListener('click', () => {
            cancelSelection();
            isFillMode = !isFillMode;
            if (isFillMode) {
                fillBtn.classList.add('active');
                canvas.style.cursor = 'crosshair';
                currentShape = 'none';
                shapeButtons.forEach(btn => btn.classList.remove('active'));
            } else {
                fillBtn.classList.remove('active');
                canvas.style.cursor = 'default';
            }
        });

        selectBtn.addEventListener('click', () => {
            if (selectionMode && !selectionImage) {
                clearSelectionState();
                return;
            }
            if (selectionMode && selectionImage) {
                cancelSelection();
                return;
            }
            startSelectionMode();
        });

        layoutBtn.addEventListener('click', () => {
            layoutOptions.style.display = layoutOptions.style.display === 'flex' ? 'none' : 'flex';
        });

        layoutOptions.querySelectorAll('.layout-option').forEach((button) => {
            button.addEventListener('click', () => {
                setLayoutMode(button.dataset.layout);
            });
        });

        function setLayoutMode(mode) {
            layoutMode = mode;
            layoutOverlay.style.backgroundImage = 'none';
            layoutOverlay.style.backgroundSize = 'auto';
            layoutOverlay.style.backgroundPosition = '0 0';
            layoutOverlay.style.backgroundRepeat = 'repeat';
            if (mode === 'grid') {
                layoutOverlay.style.backgroundImage = 'linear-gradient(to right, rgba(0,0,0,0.15) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.15) 1px, transparent 1px)';
                layoutOverlay.style.backgroundSize = '30px 30px';
            } else if (mode === 'lines') {
                layoutOverlay.style.backgroundImage = 'linear-gradient(to bottom, rgba(0, 0, 0, 0.15) 1px, transparent 1px)';
                layoutOverlay.style.backgroundSize = '100% 25px';
            }
            layoutBtn.textContent = `Розмітка: ${mode === 'none' ? 'немає' : mode === 'grid' ? 'сітка' : 'лінії'}`;
            layoutOptions.style.display = 'none';
        }

        setLayoutMode('none');

        selectionBox.addEventListener('mousedown', (e) => {
            if (!selectionImage) return;
            e.preventDefault();
            e.stopPropagation();
            isDraggingSelection = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            selectionBox.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDraggingSelection) return;
            const container = canvas.parentElement.getBoundingClientRect();
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            selectionX += dx;
            selectionY += dy;
            const bounds = getTransformedSize();
            const maxX = Math.max(0, container.width - bounds.width);
            const maxY = Math.max(0, container.height - bounds.height);
            selectionX = Math.min(Math.max(0, selectionX), maxX);
            selectionY = Math.min(Math.max(0, selectionY), maxY);
            selectionBox.style.left = `${selectionX}px`;
            selectionBox.style.top = `${selectionY}px`;
        });

        document.addEventListener('mouseup', (e) => {
            if (isDraggingSelection) {
                isDraggingSelection = false;
                selectionBox.style.cursor = 'move';
                if (selectionImage) {
                    applySelection();
                }
            }
            if (isSelecting) {
                finalizeSelection(e);
            }
        });

        rotateLeftBtn.addEventListener('click', () => {
            if (!selectionImage) return;
            selectionAngle -= 90;
            redrawSelection();
        });

        rotateRightBtn.addEventListener('click', () => {
            if (!selectionImage) return;
            selectionAngle += 90;
            redrawSelection();
        });

        scaleUpBtn.addEventListener('click', () => {
            if (!selectionImage) return;
            selectionScale = Math.min(3, selectionScale + 0.1);
            redrawSelection();
        });

        scaleDownBtn.addEventListener('click', () => {
            if (!selectionImage) return;
            selectionScale = Math.max(0.2, selectionScale - 0.1);
            redrawSelection();
        });

        applySelectionBtn.addEventListener('click', applySelection);
        cancelSelectionBtn.addEventListener('click', cancelSelection);

        brushSizeSlider.addEventListener('input', (e) => {
            updateBrushSize(e.target.value);
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (e.deltaY < 0) {
                updateBrushSize(Math.min(50, brushSize + 1));
            } else {
                updateBrushSize(Math.max(3, brushSize - 1));
            }
        });

        // Збереження
        saveBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL();
            localStorage.setItem('drawing', dataURL);
            alert('Малюнок збережено!');
        });

        downloadBtn.addEventListener('click', () => {
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = dataURL;
            link.download = 'polotno.png';
            link.click();
        });

        // Очищення
        clearBtn.addEventListener('click', () => {
            pushUndoState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            localStorage.removeItem('drawing');
        });

        // Функції для малювання фігур
        function drawShape(shape, x1, y1, x2, y2) {
            const width = x2 - x1;
            const height = y2 - y1;

            if (shape === 'triangle') {
                drawTriangle(currentTriangleType, x1, y1, x2, y2);
                return;
            }

            ctx.beginPath();
            
            switch(shape) {
                case 'square':
                    ctx.rect(x1, y1, width, height);
                    ctx.stroke();
                    break;
                case 'circle':
                    const radius = Math.sqrt(width * width + height * height) / 2;
                    ctx.arc(x1, y1, radius, 0, Math.PI * 2);
                    ctx.stroke();
                    break;
                case 'diamond':
                    ctx.moveTo((x1 + x2) / 2, y1);
                    ctx.lineTo(x2, (y1 + y2) / 2);
                    ctx.lineTo((x1 + x2) / 2, y2);
                    ctx.lineTo(x1, (y1 + y2) / 2);
                    ctx.closePath();
                    ctx.stroke();
                    break;
                case 'line':
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    break;
            }
        }
        
        // Функція для малювання різних типів трикутників
        function drawTriangle(type, x1, y1, x2, y2) {
            const width = x2 - x1;
            const height = y2 - y1;
            const centerX = x1 + width / 2;
            
            ctx.beginPath();
            
            switch(type) {
                case 'right-triangle':
                    // Прямокутний трикутник
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y1);
                    ctx.lineTo(x2, y2);
                    ctx.closePath();
                    break;
                case 'isosceles':
                    // Рівнобедрений трикутник
                    ctx.moveTo(centerX, y1);
                    ctx.lineTo(x1, y2);
                    ctx.lineTo(x2, y2);
                    ctx.closePath();
                    break;
                case 'acute':
                    // Гострокутний трикутник (дуже гострий)
                    ctx.moveTo(centerX, y1);
                    ctx.lineTo(centerX - Math.abs(width) * 0.1, y2);
                    ctx.lineTo(centerX + Math.abs(width) * 0.3, y2);
                    ctx.closePath();
                    break;
                case 'obtuse':
                    // Тупокутний трикутник
                    ctx.moveTo(x1 - Math.abs(width) * 0.3, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineTo(centerX, y2);
                    ctx.closePath();
                    break;
                case 'equilateral':
                    // Рівносторонній трикутник
                    const size = Math.max(Math.abs(width), Math.abs(height));
                    ctx.moveTo(centerX, y1);
                    ctx.lineTo(x1, y1 + size);
                    ctx.lineTo(x2, y1 + size);
                    ctx.closePath();
                    break;
                default:
                    // Рівнобедрений за замовчуванням
                    ctx.moveTo(centerX, y1);
                    ctx.lineTo(x1, y2);
                    ctx.lineTo(x2, y2);
                    ctx.closePath();
            }
            ctx.stroke();
        }

        // Обробка кнопок фігур
        const shapeButtons = document.querySelectorAll('.shape-btn[data-shape]');
        const triangleBtn = document.querySelector('[data-shape="triangle"]');
        const triangleModal = document.getElementById('triangleModal');
        const closeModalBtn = document.getElementById('closeModal');
        const triangleOptions = document.querySelectorAll('.triangle-option');
        
        // Обробка клік на кнопку трикутника
        if (triangleBtn) {
            triangleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                triangleModal.style.display = 'flex';
            });
        }
        
        // Обробка клік на опції трикутника
        triangleOptions.forEach((option) => {
            option.addEventListener('click', () => {
                currentTriangleType = option.dataset.triangle;
                currentShape = 'triangle';
                shapeButtons.forEach(btn => btn.classList.remove('active'));
                triangleBtn.classList.add('active');
                triangleModal.style.display = 'none';
                // Вимикаємо режим заливки
                isFillMode = false;
                fillBtn.classList.remove('active');
                canvas.style.cursor = 'default';
            });
        });
        
        // Закриття модального вікна
        closeModalBtn.addEventListener('click', () => {
            triangleModal.style.display = 'none';
        });
        
        triangleModal.addEventListener('click', (e) => {
            if (e.target === triangleModal) {
                triangleModal.style.display = 'none';
            }
        });
        
        // Обробка інших кнопок фігур
        shapeButtons.forEach((button) => {
            if (button.dataset.shape !== 'triangle') {
                button.addEventListener('click', () => {
                    shapeButtons.forEach(btn => btn.classList.remove('active'));
                    currentShape = button.dataset.shape;
                    if (currentShape !== 'none') {
                        button.classList.add('active');
                    }
                    // Вимикаємо режим заливки
                    isFillMode = false;
                    fillBtn.classList.remove('active');
                    canvas.style.cursor = 'default';
                });
            }
        });
    </script>
</body>
</html>
